<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DataSnap | Sign Up</title>
  <link rel="shortcut icon" href="{{url_for('static',filename='favicon.png')}}" type="image/x-icon">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      font-family: 'Outfit', sans-serif;
      box-sizing: border-box;
    }

    body {
      background-color: #000000;
      color: #E7E9EA;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 20px;
      overflow-x: hidden;
    }

    #bg-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      opacity: 0.6;
    }

    .form-signin {
      width: 100%;
      max-width: 480px;
      position: relative;
    }

    .card {
      background: #000000;
      border: 1px solid #2F3336;
      border-radius: 16px;
      overflow: hidden;
    }

    .card-body {
      padding: 48px 40px;
      position: relative;
      z-index: 10;
    }

    .logo-container {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-container img {
      height: 48px;
      width: auto;
      object-fit: contain;
    }

    h2 {
      font-size: 28px;
      font-weight: 700;
      color: #E7E9EA;
      margin-bottom: 8px;
      text-align: center;
      letter-spacing: -0.02em;
    }

    .subtitle {
      color: #71767B;
      font-size: 15px;
      margin-bottom: 32px;
      text-align: center;
      font-weight: 400;
    }

    .form-floating {
      margin-bottom: 20px;
      position: relative;
    }

    .form-control {
      background-color: #000000;
      border: 1px solid #2F3336;
      border-radius: 4px;
      color: #E7E9EA;
      padding: 16px;
      height: 60px;
      font-size: 15px;
      transition: all 0.2s ease;
    }

    .form-control:focus {
      background-color: #000000;
      border-color: #1D9BF0;
      color: #E7E9EA;
      box-shadow: 0 0 0 1px #1D9BF0;
    }

    .form-control::placeholder {
      color: transparent;
    }

    .form-floating>label {
      color: #71767B;
      font-size: 15px;
      padding: 16px;
      font-weight: 400;
      transition: all 0.2s ease-out;
    }

    .form-floating>.form-control:focus~label,
    .form-floating>.form-control:not(:placeholder-shown)~label {
      color: #1D9BF0;
      transform: scale(0.85) translateY(-14px) translateX(0.15rem);
      background: #000000;
      padding: 0 4px;
      height: auto;
    }

    .btn-register {
      background: #E7E9EA;
      color: #0F1419;
      border: none;
      border-radius: 9999px;
      padding: 16px;
      width: 100%;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.2px;
      margin-top: 12px;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .btn-register:hover {
      background: #D7DBDC;
    }

    .btn-register:active {
      background: #B9C0C2;
    }

    .links-container {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 32px;
      padding-top: 24px;
      position: relative;
      z-index: 20;
    }

    .links-container span {
      color: #71767B;
      font-size: 14px;
    }

    .links-container a {
      color: #1D9BF0;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: text-decoration 0.2s;
    }

    .links-container a:hover {
      text-decoration: underline;
    }

    .password-hint {
      color: #71767B;
      font-size: 12px;
      margin-top: 8px;
      margin-left: 4px;
      font-weight: 400;
    }

    .alert {
      background: rgba(255, 212, 0, 0.1);
      border: 1px solid rgba(255, 212, 0, 0.4);
      color: #FFD400;
      border-radius: 4px;
      padding: 16px;
      font-size: 14px;
      margin-bottom: 24px;
    }

    .btn-close {
      filter: invert(1) grayscale(100%) brightness(200%);
    }
  </style>
</head>

<body>
  <canvas id="bg-canvas"></canvas>
  <main class="form-signin">
    <div class="card">
      <div class="card-body">
        {% with messages = get_flashed_messages() %}
        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-dismissible fade show" role="alert">
          <i class="fas fa-exclamation-triangle me-2"></i><strong>{{message}}</strong>
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form action="/signup" method="post" onsubmit="return validate()">
          <div class="logo-container">
            <img src="static/logo_main.png" alt="DataSnap Logo">
          </div>

          <h2>Create Account</h2>
          <p class="subtitle">Join DataSnap to start building forms</p>

          <div class="form-floating">
            <input type="text" class="form-control" name="name" id="nameInput" placeholder="Full Name" required>
            <label for="nameInput">Full Name</label>
          </div>

          <div class="form-floating">
            <input type="email" class="form-control" name="username" id="emailInput" placeholder="name@example.com"
              required>
            <label for="emailInput">Email Address</label>
          </div>

          <div class="form-floating" style="margin-bottom: 8px;">
            <input type="password" class="form-control" name="password" id="password" placeholder="Password" required>
            <label for="password">Password</label>
          </div>
          <p class="password-hint"><i class="fas fa-info-circle me-1"></i> Minimum 6 characters required</p>

          <div class="form-floating" style="margin-top: 20px;">
            <input type="password" class="form-control" name="re_password" id="re_password"
              placeholder="Confirm Password" required>
            <label for="re_password">Confirm Password</label>
          </div>

          <button class="btn-register" type="submit">Create Account</button>
        </form>

        <div class="links-container">
          <span>Already have an account?</span>
          <a href="/">Sign In <i class="fas fa-arrow-right ms-1"></i></a>
        </div>
      </div>
    </div>
  </main>

  <script>
    function validate() {
      var pass = document.getElementById("password").value;
      var rpass = document.getElementById("re_password").value;
      if (pass == rpass) {
        return true;
      } else {
        alert("Passwords don't match!");
        document.getElementById("password").value = "";
        document.getElementById("re_password").value = "";
        return false;
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // Three.js 3D Background Setup
    const canvas = document.querySelector('#bg-canvas');
    const scene = new THREE.Scene();

    // Add subtle fog to blend points into the black background
    scene.fog = new THREE.FogExp2(0x000000, 0.001);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });

    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.position.setZ(30);

    // Create a generic organic point mesh (Starfield / Dust effect)
    const particlesGeometry = new THREE.BufferGeometry();
    const particlesCount = 1500;
    const posArray = new Float32Array(particlesCount * 3);

    for (let i = 0; i < particlesCount * 3; i++) {
      // Spread particles across a wide area
      posArray[i] = (Math.random() - 0.5) * 100;
    }

    particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

    // Material for the particles
    const particlesMaterial = new THREE.PointsMaterial({
      size: 0.05,
      color: 0x1D9BF0, // Theme accent color
      transparent: true,
      opacity: 0.8,
      blending: THREE.AdditiveBlending
    });

    const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
    scene.add(particlesMesh);

    // Mouse interaction variables
    let mouseX = 0;
    let mouseY = 0;
    let targetX = 0;
    let targetY = 0;
    const windowHalfX = window.innerWidth / 2;
    const windowHalfY = window.innerHeight / 2;

    document.addEventListener('mousemove', (event) => {
      mouseX = (event.clientX - windowHalfX);
      mouseY = (event.clientY - windowHalfY);
    });

    // Animation Loop
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const elapsedTime = clock.getElapsedTime();

      // Slowly rotate the entire mesh
      particlesMesh.rotation.y = elapsedTime * 0.05;
      particlesMesh.rotation.x = elapsedTime * 0.02;

      // Add subtle parallax effect based on mouse movement
      targetX = mouseX * 0.001;
      targetY = mouseY * 0.001;

      particlesMesh.rotation.y += 0.05 * (targetX - particlesMesh.rotation.y);
      particlesMesh.rotation.x += 0.05 * (targetY - particlesMesh.rotation.x);

      renderer.render(scene, camera);
    }

    animate();

    // Handle Window Resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>

</html>
