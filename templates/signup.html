<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DataSnap | Sign Up</title>
  <link rel="shortcut icon" href="{{url_for('static',filename='favicon.png')}}" type="image/x-icon">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      font-family: 'Outfit', sans-serif;
      box-sizing: border-box;
    }

    body {
      background-color: #0B0E14;
      background-image:
        radial-gradient(at 0% 0%, rgba(79, 70, 229, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(124, 58, 237, 0.15) 0px, transparent 50%);
      color: #E2E8F0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 20px;
    }

    .form-signin {
      width: 100%;
      max-width: 480px;
      position: relative;
    }

    .card {
      background: rgba(17, 24, 39, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      overflow: hidden;
    }

    .card-body {
      padding: 48px 40px;
      position: relative;
      z-index: 10;
    }

    .logo-container {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-container img {
      height: 48px;
      width: auto;
      object-fit: contain;
      filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.1));
    }

    h2 {
      font-size: 28px;
      font-weight: 700;
      color: #F8FAFC;
      margin-bottom: 8px;
      text-align: center;
      letter-spacing: -0.02em;
    }

    .subtitle {
      color: #94A3B8;
      font-size: 15px;
      margin-bottom: 32px;
      text-align: center;
      font-weight: 400;
    }

    .form-floating {
      margin-bottom: 20px;
      position: relative;
    }

    .form-control {
      background-color: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: #F8FAFC;
      padding: 16px;
      height: 60px;
      font-size: 15px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .form-control:focus {
      background-color: rgba(15, 23, 42, 0.8);
      border-color: #6366F1;
      color: #F8FAFC;
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
    }

    .form-control::placeholder {
      color: transparent;
    }

    .form-floating>label {
      color: #64748B;
      font-size: 14px;
      padding: 16px;
      font-weight: 500;
      transition: all 0.2s ease-out;
    }

    .form-floating>.form-control:focus~label,
    .form-floating>.form-control:not(:placeholder-shown)~label {
      color: #818CF8;
      transform: scale(0.85) translateY(-14px) translateX(0.15rem);
      background: transparent;
    }

    .btn-register {
      background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 16px;
      width: 100%;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-top: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 20px -10px rgba(99, 102, 241, 0.6);
    }

    .btn-register:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 25px -10px rgba(99, 102, 241, 0.8);
    }

    .btn-register:active {
      transform: translateY(0);
    }

    .links-container {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      position: relative;
      z-index: 20;
    }

    .links-container span {
      color: #94A3B8;
      font-size: 14px;
    }

    .links-container a {
      color: #A5B4FC;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .links-container a:hover {
      color: #C7D2FE;
    }

    .password-hint {
      color: #94A3B8;
      font-size: 12px;
      margin-top: 8px;
      margin-left: 4px;
      font-weight: 400;
    }

    .alert {
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.2);
      color: #FDE68A;
      border-radius: 12px;
      padding: 16px;
      font-size: 14px;
      margin-bottom: 24px;
      backdrop-filter: blur(4px);
    }

    .btn-close {
      filter: invert(1) grayscale(100%) brightness(200%);
    }
  </style>
</head>

<body>
  <main class="form-signin">
    <div class="card">
      <div class="card-body">
        {% with messages = get_flashed_messages() %}
        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-dismissible fade show" role="alert">
          <i class="fas fa-exclamation-triangle me-2"></i><strong>{{message}}</strong>
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form action="/signup" method="post" onsubmit="return validate()">
          <div class="logo-container">
            <img src="static/logo_main.png" alt="DataSnap Logo">
          </div>

          <h2>Create Account</h2>
          <p class="subtitle">Join DataSnap to start building forms</p>

          <div class="form-floating">
            <input type="text" class="form-control" name="name" id="nameInput" placeholder="Full Name" required>
            <label for="nameInput">Full Name</label>
          </div>

          <div class="form-floating">
            <input type="email" class="form-control" name="username" id="emailInput" placeholder="name@example.com"
              required>
            <label for="emailInput">Email Address</label>
          </div>

          <div class="form-floating" style="margin-bottom: 8px;">
            <input type="password" class="form-control" name="password" id="password" placeholder="Password" required>
            <label for="password">Password</label>
          </div>
          <p class="password-hint"><i class="fas fa-info-circle me-1"></i> Minimum 6 characters required</p>

          <div class="form-floating" style="margin-top: 20px;">
            <input type="password" class="form-control" name="re_password" id="re_password"
              placeholder="Confirm Password" required>
            <label for="re_password">Confirm Password</label>
          </div>

          <button class="btn-register" type="submit">Create Account</button>
        </form>

        <div class="links-container">
          <span>Already have an account?</span>
          <a href="/">Sign In <i class="fas fa-arrow-right ms-1"></i></a>
        </div>
      </div>
    </div>
  </main>

  <script>
    function validate() {
      var pass = document.getElementById("password").value;
      var rpass = document.getElementById("re_password").value;
      if (pass == rpass) {
        return true;
      } else {
        alert("Passwords don't match!");
        document.getElementById("password").value = "";
        document.getElementById("re_password").value = "";
        return false;
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
