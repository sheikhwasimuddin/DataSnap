<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <title>DataSnap | Dashboard</title>
  <link rel="shortcut icon" href="{{url_for('static',filename='favicon.png')}}" type="image/x-icon">

  <style>
    * {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      box-sizing: border-box;
    }

    body {
      background-color: #000000;
      color: #E7E9EA;
      padding: 24px;
      min-height: 100vh;
      margin: 0;
      overflow-x: hidden;
    }

    /* 3D Canvas Background */
    #bg-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      pointer-events: none;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid #2F3336;
    }

    h1 {
      color: #E7E9EA;
      font-size: 44px;
      font-weight: 700;
      margin: 0;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .header-actions {
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: nowrap;
    }

    .search-box {
      max-width: 300px;
      min-width: 150px;
      width: 100%;
      flex-shrink: 1;
      position: relative;
    }

    .search-box input {
      width: 100%;
      background-color: #000000;
      border: 1px solid #2F3336;
      border-radius: 9999px;
      padding: 10px 16px 10px 40px;
      font-size: 14px;
      color: #E7E9EA;
      transition: all 0.2s ease;
    }

    .search-box::before {
      content: '\f002';
      font-family: 'Font Awesome 5 Free';
      font-weight: 900;
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #71767B;
      font-size: 14px;
    }

    .search-box input:focus {
      border-color: #1D9BF0;
      box-shadow: 0 0 0 1px #1D9BF0;
      outline: none;
    }

    .search-box input::placeholder {
      color: #71767B;
    }

    .btn-primary,
    .btn-danger {
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 700;
      border-radius: 9999px;
      border: none;
      cursor: pointer;
      transition: background-color 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: #E7E9EA;
      color: #0F1419;
    }

    .btn-primary:hover {
      background: #D7DBDC;
      color: #0F1419;
    }

    .btn-primary:focus {
      box-shadow: 0 0 0 2px #000000, 0 0 0 4px #E7E9EA;
      outline: none;
    }

    .btn-danger {
      background: #000000;
      color: #F4212E;
      border: 1px solid #F4212E;
    }

    .btn-danger:hover {
      background: rgba(244, 33, 46, 0.1);
    }

    .modal-content {
      background-color: #000000;
      border: 1px solid #2F3336;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
    }

    .modal-header {
      background: #000000;
      color: #E7E9EA;
      border-bottom: 1px solid #2F3336;
      border-radius: 16px 16px 0 0;
      padding: 20px 24px;
    }

    .modal-title {
      font-weight: 700;
      font-size: 20px;
    }

    .modal-header .btn-close {
      filter: invert(1) grayscale(100%) brightness(200%);
      opacity: 0.5;
    }

    .modal-header .btn-close:hover {
      opacity: 1;
    }

    .modal-body {
      padding: 24px;
    }

    .modal-footer {
      border-top: 1px solid #2F3336;
      padding: 16px 24px;
    }

    .form-label {
      color: #E7E9EA;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .form-control {
      background-color: #000000;
      border: 1px solid #2F3336;
      border-radius: 4px;
      padding: 12px 14px;
      font-size: 15px;
      color: #E7E9EA;
      transition: all 0.2s ease;
    }

    .form-control:focus {
      border-color: #1D9BF0;
      background-color: #000000;
      color: #E7E9EA;
      box-shadow: 0 0 0 1px #1D9BF0;
      outline: none;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 24px;
    }

    .card {
      background: #000000;
      border: 1px solid #2F3336;
      border-radius: 16px;
      transition: all 0.1s ease;
      overflow: hidden;
      position: relative;
      transform-style: preserve-3d;
      will-change: transform;
    }

    .card:hover {
      background: #16181C;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(29, 155, 240, 0.1);
    }

    .card-body {
      transform: translateZ(40px);
    }

    .card-body {
      padding: 24px;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .card-title {
      color: #E7E9EA;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 24px;
      word-break: break-word;
      line-height: 1.4;
      flex-grow: 1;
    }

    .card-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: auto;
    }

    .card-actions .btn {
      width: 100%;
      padding: 12px;
      font-size: 14px;
    }

    .card-actions .btn-primary {
      background: #E7E9EA;
      color: #0F1419;
    }

    .card-actions .btn-primary:hover {
      background: #D7DBDC;
    }

    @media (max-width: 768px) {
      body {
        padding: 16px;
      }

      .header {
        flex-direction: column;
        align-items: stretch;
      }

      .header-actions {
        width: 100%;
        flex-direction: column;
        align-items: stretch;
      }

      .search-box {
        max-width: none;
      }

      .cards-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <canvas id="bg-canvas"></canvas>
  {% macro catch(on_exception) %}
  {{ handle_catch(caller, on_exception) }}
  {% endmacro %}

  <div class="header">
    <h1>
      <img src="{{url_for('static',filename='favicon.png')}}" alt="DataSnap" height="64" style="border-radius: 8px;">
      DataSnap
    </h1>
    <div class="header-actions">
      <div class="search-box">
        <input type="search" id="search_chapter" placeholder="Search forms..." aria-label="Search">
      </div>
      <button type="button" class="btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal">
        <i class="fas fa-plus"></i> Create New Form
      </button>
      <a href="/logout" style="text-decoration: none;">
        <button type="button" class="btn-primary">
          <i class="fas fa-sign-out-alt"></i> Logout
        </button>
      </a>
    </div>
  </div>

  <!-- Create Form Modal -->
  <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="exampleModalLabel"><i class="fas fa-file-alt"></i> Create New Form</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <form action="/new-form" method="POST">
          <div class="modal-body">
            <div class="mb-3">
              <label for="formGroupExampleInput" class="form-label">Form Title</label>
              <input type="text" class="form-control" id="form_title" name="form_title" placeholder="Enter form title"
                required>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn-danger" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn-primary">Create Form</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Forms Grid -->
  <div class="cards-grid">
    {% call catch('') %}
    {% for key,val in forms.items()%}
    <div class="card">
      <div class="card-body">
        <h5 class="card-title">{{val['form_title']}}</h5>
        <div class="card-actions">
          <a href='/edit/{{key}}' class="btn btn-primary"><i class="fas fa-edit"></i> Edit Form</a>
          <form action="/form-delete/{{key}}" method="post" onsubmit="return confirmation(this)" style="margin: 0;">
            <button type="submit" class="btn btn-danger" style="width: 100%;"><i class="fas fa-trash"></i> Delete
              Form</button>
          </form>
        </div>
      </div>
    </div>
    {% endfor %}
    {% endcall %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function confirmation(element) {
      return confirm("Are you sure you want to delete this form?");
    }

    document.getElementById("search_chapter").addEventListener('input', function () {
      const searchTerm = this.value.toLowerCase();
      const cardTitles = document.getElementsByClassName("card-title");
      const cards = document.getElementsByClassName("card");

      for (let i = 0; i < cardTitles.length; i++) {
        const title = cardTitles[i].innerHTML.toLowerCase();
        if (title.includes(searchTerm)) {
          cards[i].style.display = "block";
        } else {
          cards[i].style.display = "none";
        }
      }
    });

    // 3D Tilt Effect
    const cards = document.querySelectorAll('.card');

    cards.forEach(card => {
      card.addEventListener('mousemove', e => {
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        const centerX = rect.width / 2;
        const centerY = rect.height / 2;

        // Calculate tilt angle based on mouse distance from center
        // Max tilt is 8 degrees
        const rotateX = ((y - centerY) / centerY) * -8;
        const rotateY = ((x - centerX) / centerX) * 8;

        card.style.transform = `perspective(1000px) scale3d(1.02, 1.02, 1.02) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
      });

      card.addEventListener('mouseleave', () => {
        card.style.transform = 'perspective(1000px) scale3d(1, 1, 1) rotateX(0deg) rotateY(0deg)';
        card.style.transition = 'transform 0.5s cubic-bezier(0.23, 1, 0.32, 1)';
      });

      card.addEventListener('mouseenter', () => {
        card.style.transition = 'none'; // remove transition for smooth tracking
      });
    });
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // Three.js 3D Background Setup
    const canvas = document.querySelector('#bg-canvas');
    if (canvas) {
      const scene = new THREE.Scene();
      scene.fog = new THREE.FogExp2(0x000000, 0.04);
      const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });

      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.position.setZ(15);

      const geometry = new THREE.IcosahedronGeometry(10, 1);
      const material = new THREE.MeshBasicMaterial({
        color: 0x1D9BF0, wireframe: true, transparent: true, opacity: 0.15
      });
      const torus = new THREE.Mesh(geometry, material);
      scene.add(torus);

      const particlesGeometry = new THREE.BufferGeometry();
      const particlesCount = 300;
      const posArray = new Float32Array(particlesCount * 3);
      for (let i = 0; i < particlesCount * 3; i++) {
        posArray[i] = (Math.random() - 0.5) * 60;
      }
      particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
      const particlesMaterial = new THREE.PointsMaterial({
        size: 0.05, color: 0xE7E9EA, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending
      });
      const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
      scene.add(particlesMesh);

      let mouseX = 0;
      let mouseY = 0;
      let targetX = 0;
      let targetY = 0;
      const windowHalfX = window.innerWidth / 2;
      const windowHalfY = window.innerHeight / 2;

      document.addEventListener('mousemove', (event) => {
        mouseX = (event.clientX - windowHalfX);
        mouseY = (event.clientY - windowHalfY);
      });

      const clock = new THREE.Clock();
      function animate() {
        requestAnimationFrame(animate);
        const elapsedTime = clock.getElapsedTime();
        torus.rotation.x += 0.002;
        torus.rotation.y += 0.003;
        torus.rotation.z += 0.001;
        torus.position.y = Math.sin(elapsedTime * 0.5) * 1.5;
        particlesMesh.rotation.y = elapsedTime * 0.05;
        targetX = mouseX * 0.001;
        targetY = mouseY * 0.001;
        scene.rotation.y += 0.05 * (targetX - scene.rotation.y);
        scene.rotation.x += 0.05 * (targetY - scene.rotation.x);
        renderer.render(scene, camera);
      }
      animate();

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    }
  </script>
</body>

</html>
